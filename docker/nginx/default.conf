server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php;

    charset utf-8;

    # Redirect direct .php access to the clean URL
    # e.g. /about.php -> /about, /about.php?q=1 -> /about?q=1
    if ($request_uri ~ ^(/[^?]*?)\.php(\?.*)?$) {
        return 301 $1$2;
    }

    # Route clean URLs — try file, then directory, then append .php
    location / {
        try_files $uri $uri/ $uri.php?$query_string;
    }

    # PHP-FPM handler (reached internally via try_files rewrite)
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # Deny dotfiles (.git, .env, etc.)
    location ~ /\. {
        deny all;
    }

    # Static asset caching
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }
}
