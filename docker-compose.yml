services:
  nginx:
    image: nginx:alpine
    ports:
      - "84:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    restart: unless-stopped

  php:
    image: php:8.2-fpm-alpine
    volumes:
      - .:/var/www/html:ro
    restart: unless-stopped
